name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build static Mini App shell
        env:
          NEXT_PUBLIC_BASE_PATH: /creditz
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.PAGES_API_BASE_URL || 'https://salty-onions-leave.loca.lt' }}
          NEXT_PUBLIC_APP_URL: https://jordan-public.github.io/creditz
          NEXT_PUBLIC_DEMO_MODE: "true"
          NEXT_PUBLIC_WORLD_APP_ID: ${{ vars.NEXT_PUBLIC_WORLD_APP_ID }}
          NEXT_PUBLIC_WORLD_ACTION_REGISTER: creditz-register-v1
          NEXT_PUBLIC_WORLD_ACTION_SPEND: creditz-spend-v1
        run: pnpm build:pages
      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd apps/web/out
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy GitHub Pages"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
