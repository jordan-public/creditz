name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build static Mini App shell
        env:
          NEXT_PUBLIC_BASE_PATH: /creditz
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.PAGES_API_BASE_URL || 'https://jux1g6-ip-98-113-54-218.tunnelmole.net' }}
          NEXT_PUBLIC_APP_URL: https://jordan-public.github.io/creditz
          NEXT_PUBLIC_DEMO_MODE: "true"
          NEXT_PUBLIC_WORLD_APP_ID: ${{ vars.NEXT_PUBLIC_WORLD_APP_ID || 'app_dec1e4137e35b9ee7a7230b897cbd908' }}
          NEXT_PUBLIC_WORLD_ACTION_REGISTER: creditz-register-v1
          NEXT_PUBLIC_WORLD_ACTION_SPEND: creditz-spend-v1
          NEXT_PUBLIC_BLINK_MERCHANT_ID: ${{ vars.NEXT_PUBLIC_BLINK_MERCHANT_ID || 'f3d84a7d-82e2-48f1-a5bb-cd01540ad204' }}
          NEXT_PUBLIC_BLINK_CHAIN_ID: "84532"
          NEXT_PUBLIC_BLINK_TOKEN_ADDRESS: "0x036CbD53842c5426634e7929541eC2318f3dCF7e"
          NEXT_PUBLIC_BLINK_TREASURY_ADDRESS: ${{ vars.NEXT_PUBLIC_BLINK_TREASURY_ADDRESS || '0x1a6aafb61fbfced49E2fB078179787E8e866fca9' }}
        run: pnpm build:pages
      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd apps/web/out
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy GitHub Pages"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
