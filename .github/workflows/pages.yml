name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/configure-pages@v5
      - run: pnpm install --frozen-lockfile
      - name: Build static Mini App shell
        env:
          NEXT_PUBLIC_BASE_PATH: /creditz
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.PAGES_API_BASE_URL || 'https://two-moose-live.loca.lt' }}
          NEXT_PUBLIC_APP_URL: https://jordan-public.github.io/creditz
          NEXT_PUBLIC_DEMO_MODE: "true"
          NEXT_PUBLIC_WORLD_APP_ID: ${{ vars.NEXT_PUBLIC_WORLD_APP_ID }}
          NEXT_PUBLIC_WORLD_ACTION_REGISTER: creditz-register-v1
          NEXT_PUBLIC_WORLD_ACTION_SPEND: creditz-spend-v1
        run: pnpm build:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
